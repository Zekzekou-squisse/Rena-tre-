function getSystemPrompt() {
  const heure = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Paris"})).getHours();
  let salutation = "Bonjour";
  let tonAccueil = "";
  if (heure >= 6 && heure < 12) { salutation = "Bonjour"; tonAccueil = "C'est le matin."; }
  else if (heure >= 12 && heure < 18) { salutation = "Bonjour"; tonAccueil = "C'est l'apres-midi."; }
  else if (heure >= 18 && heure < 23) { salutation = "Bonsoir"; tonAccueil = "C'est le soir."; }
  else { salutation = "Bonsoir"; tonAccueil = "Il est tard dans la nuit."; }

  return `Tu es le compagnon de Re-n'etre — l'espace d'Ezeckiel, therapeute holistique specialise dans la presence corporelle.

HEURE : Il est ${heure}h en France. ${tonAccueil} Utilise "${salutation}" pour ouvrir.

PREMIER MESSAGE — dans cet ordre exact :
1. Phrase de securite : "Ce que tu partages ici reste entre nous. Je ne garde rien, je ne juge rien. Tu peux aller a ton rythme."
2. Demande le prenom : "Comment tu t'appelles ?"

COLLECTE NATURELLE (jamais en interrogatoire) :
- Prenom en premier, toujours
- Age, profession ou etudes
- Sante : "Est-ce qu'il y a des aspects de sante qui font partie de ton quotidien — une fatigue, du stress, des douleurs — dont tu voudrais qu'on tienne compte ?"

EN SOUS-MARIN — 5 elements (jamais nommes) :
- BOIS : Foie/Vesicule biliaire → tensions, migraines, colere
- FEU : Coeur/Intestin grele → stress, palpitations, insomnie
- TERRE : Rate/Estomac → digestion, rumination, fatigue
- METAL : Poumons/Gros intestin → tristesse, respiration, peau
- EAU : Reins/Vessie → peur, fatigue chronique, dos

POSTURE : Tu n'interpretes pas, tu ne projettes pas, tu ne juges pas.
Tu invites vers le SENTI (direct, corporel), jamais le ressenti (emotionnel/mental).

SI LA PERSONNE NE SENT PAS SON CORPS :
1. 4-5 respirations lentes
2. "Pose une main sur ta poitrine. Est-ce que tu sens ton coeur battre ?"
3. Si rien : "C'est interessant. Parfois notre mental nous protege tellement qu'il nous coupe d'une partie de nous-memes." — ne pas insister.

TON : Leger, chaleureux, humour doux possible. Jamais lourd ni solennel.

SEQUENCE :
1. Identifier l'emotion presente
2. "Est-ce que tu as deja ressenti ca avant — peut-etre plus jeune ?"
3. Mettre en lumiere l'ecart entre la realite et ce que vit la personne (la dissociation — le trauma vit la)
4. "Qu'est-ce que tu te racontes dans ces moments-la ?" — UNE SEULE FOIS, au bon moment, jamais en pleine detresse
5. Respiration : "Pose une main la ou tu sens quelque chose. Inspire lentement... A l'expiration, souffle ce qui est la."

OUVRIR LE PONT (seulement quand l'elan est vivant) :
"Ce qui vient de s'allumer la — ca merite un vrai espace. Pas un ecran. Une vraie presence humaine."
Si interet : termine EXACTEMENT par [PROPOSER_APPEL]

FIN DE CONVERSATION sans RDV :
"Je peux t'envoyer un resume de ce qu'on a traverse ensemble. Tu veux me laisser ton email ?"

REGLES ABSOLUES :
- UNE seule question a la fois
- 2 a 4 phrases par reponse
- Tutoiement, chaleur reelle
- Jamais de liste
- Prenom utilise UNE fois au debut, jamais repete
- Jamais le nom d'Ezeckiel dans le chat
- Jamais nommer les 5 elements, Holisyntonie, Voie du Sentir
- Idees noires → orienter vers aide humaine immediate`;
}

async function callIA(messages) {
  try {
    const r = await fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: getSystemPrompt(),
        messages: messages.map(m => ({ role: m.role, content: m.content }))
      })
    });
    const d = await r.json();
    return d.content?.[0]?.text || "Je suis la, avec toi.";
  } catch {
    return "Je suis toujours la. Prends le temps qu'il te faut.";
  }
}

function App() {
  const [started, setStarted] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [typing, setTyping] = useState(false);
  const [showAppel, setShowAppel] = useState(false);
  const [appelStep, setAppelStep] = useState("invite");
  const [confirmReset, setConfirmReset] = useState(false);
  const [showEzeckiel, setShowEzeckiel] = useState(false);
  const [showEmail, setShowEmail] = useState(false);
  const [emailInput, setEmailInput] = useState("");
  const [emailSent, setEmailSent] = useState(false);
  const msgRef = useRef(null);

  useEffect(() => { msgRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, typing, showAppel]);

  function now() { return new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }); }

  async function sendMsg(txt) {
    const content = txt || input;
    if (!content?.trim()) return;
    const um = { role: "user", content, time: now() };
    const hist = [...messages, um];
    setMessages(hist); setInput(""); setTyping(true);
    let rep = await callIA(hist);
    setTyping(false);
    if (rep.includes("[PROPOSER_APPEL]")) {
      rep = rep.replace("[PROPOSER_APPEL]", "").trim();
      setMessages(p => [...p, { role: "assistant", content: rep, time: now() }]);
      setTimeout(() => setShowAppel(true), 800);
    } else {
      setMessages(p => [...p, { role: "assistant", content: rep, time: now() }]);
    }
  }

  async function sendRecap(email) {
    const resume = messages.map(m => (m.role === "assistant" ? "Re-n'etre : " : "Vous : ") + m.content).join("\n\n");
    const formData = new FormData();
    formData.append("email", email);
    formData.append("_replyto", email);
    formData.append("_subject", "Votre resume Re-n'etre");
    formData.append("message", resume);
    try {
      await fetch("https://formspree.io/f/mojzpoja", { method: "POST", body: formData, headers: { "Accept": "application/json" } });
    } catch(e) {}
    setEmailSent(true);
  }

  function start() {
    setStarted(true);
    setTimeout(() => {
      setMessages([{ role: "assistant", content: "Ce que tu partages ici reste entre nous. Je ne garde rien, je ne juge rien. Tu peux aller a ton rythme.\n\nComment tu t'appelles ?", time: "" }]);
    }, 500);
  }

  function resetAll() {
    setStarted(false); setMessages([]); setInput(""); setTyping(false);
    setShowAppel(false); setAppelStep("invite"); setConfirmReset(false);
    setShowEzeckiel(false); setShowEmail(false); setEmailSent(false);
  }

  if (!started) return (
    <div style={{background:"#FAF8F5",minHeight:"100vh"}}>
      <style>{css}</style>
      <div className="splash">
        <div className="grain"/>
        <div className="ring"><div style={{width:10,height:10,borderRadius:"50%",background:"#1C1C1A"}}/></div>
        <h1 className="splash-h">Re-n&rsquo;<em>etre</em></h1>
        <p className="splash-cite">&laquo;&nbsp;Aucun enseignement theorique sur l&rsquo;eau de source n&rsquo;a desaltere un assouiffe.&nbsp;&raquo;</p>
        <p className="splash-auteur">&mdash; Luis Ansa</p>
        <p className="splash-sub">Une presence humaine, augmentee par l&rsquo;intelligence artificielle. Pour que la vraie rencontre commence la ou l&rsquo;ecran s&rsquo;arrete.</p>
        <button className="start-btn" onClick={start}>Commencer</button>
        <p className="splash-note">Gratuit &middot; Confidentiel &middot; Sans inscription</p>
      </div>
    </div>
  );

  return (
    <div style={{background:"#0a0a0a",minHeight:"100vh"}}>
      <style>{css}</style>
      <div className="chat-wrap">
        <div className="top">
          <div className="top-left">
            <div className="top-dot"/>
            <span className="top-name">Re-n&rsquo;etre</span>
          </div>
          <button className="top-back" onClick={() => setConfirmReset(true)}>&#8635; Recommencer</button>
        </div>
        <div className="msgs">
          {messages.map((m, i) => (
            m.role === "assistant" ? (
              <div key={i} className="row-ai">
                <div className="av">E</div>
                <div className="bub-ai">{m.content}</div>
              </div>
            ) : (
              <div key={i} className="row-user">
                <div className="bub-user">{m.content}</div>
              </div>
            )
          ))}
          {typing && (
            <div className="row-ai">
              <div className="av">E</div>
              <div className="bub-ai">
                <div className="typing">
                  {[0,1,2].map(i => <div key={i} className="td" style={{animationDelay:`${i*0.2}s`}}/>)}
                </div>
              </div>
            </div>
          )}
          {messages.length === 1 && !typing && (
            <div className="probs">
              {PROBLEMATIQUES.map((p, i) => (
                <button key={i} className="prob" onClick={() => sendMsg(p.amorce)}>
                  <span style={{fontSize:17,flexShrink:0}}>{p.emoji}</span>
                  <span>{p.label}</span>
                </button>
              ))}
            </div>
          )}
          <div ref={msgRef}/>
        </div>
        <div className="izone">
          <div className="irow">
            <textarea
              className="ta"
              rows={1}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(input); } }}
              placeholder="Ecris ce qui est la, maintenant..."
            />
            <button className="send" onClick={() => sendMsg(input)}>&#8594;</button>
          </div>
          {messages.length > 2 && !showEmail && (
            <div style={{textAlign:"center",marginTop:10}}>
              <button onClick={() => setShowEmail(true)} style={{background:"none",border:"none",color:"rgba(244,244,242,0.3)",fontSize:12,cursor:"pointer",letterSpacing:"0.5px"}}>
                Recevoir un resume par email
              </button>
            </div>
          )}
        </div>
      </div>

      {showAppel && (
        <div className="overlay" onClick={e => { if (e.target.className === "overlay" && appelStep !== "confirmed") setShowAppel(false); }}>
          <div className="sheet">
            <div className="handle"/>
            {appelStep === "invite" && (
              <>
                <div className="ez-av">E</div>
                <h2 className="sh">Faire ce pas maintenant,<br/><em>c&rsquo;est ton premier geste pour toi.</em></h2>
                <p className="ss">Pas un service qu&rsquo;on achete. Le premier &laquo;&nbsp;je compte&nbsp;&raquo;. Une vraie presence humaine t&rsquo;accueille la ou l&rsquo;ecran s&rsquo;arrete. Un appel de 15 minutes, gratuit, sans rien devoir apres.</p>
                <div className="qt">
                  <p>&laquo;&nbsp;Je ne te dis pas quoi faire. Je t&rsquo;aide a entendre ce que tu sais deja &mdash; mais que le bruit a couvert.&nbsp;&raquo;</p>
                  <span>Ezeckiel &middot; therapeute holistique</span>
                </div>
                <button className="cbtn" onClick={() => setAppelStep("calendar")}>Choisir un creneau</button>
                <button className="gbtn" onClick={() => setShowEzeckiel(true)} style={{fontSize:11,letterSpacing:"0.5px",textTransform:"uppercase"}}>Qui est Ezeckiel ?</button>
                <button className="gbtn" onClick={() => setShowAppel(false)}>Pas tout de suite &mdash; continuer a ecrire</button>
              </>
            )}
            {appelStep === "calendar" && (
              <>
                <h2 className="sh">Choisis ton creneau<br/><em>directement dans mon agenda.</em></h2>
                <p className="ss">15 minutes, par telephone ou visio. Pendant que l&rsquo;elan est vivant.</p>
                <div style={{background:"#161614",border:"1px solid rgba(244,244,242,0.1)",borderRadius:12,padding:18,marginBottom:12,textAlign:"center"}}>
                  <p style={{fontSize:13,color:"rgba(244,244,242,0.4)",marginBottom:14}}>Tu vas etre redirige vers le calendrier.</p>
                  <button className="cbtn" style={{marginTop:0}} onClick={() => { window.open("https://calendly.com/zekzekou/30min", "_blank"); setTimeout(() => setAppelStep("confirmed"), 1500); }}>Voir les creneaux disponibles &#8594;</button>
                </div>
                <button className="gbtn" onClick={() => setAppelStep("invite")}>&#8592; Retour</button>
              </>
            )}
            {appelStep === "confirmed" && (
              <>
                <div className="check">&#10003;</div>
                <h2 className="sh">C&rsquo;est note.<br/><em>Ton premier pas.</em></h2>
                <p className="ss">Tu recevras une confirmation. D&rsquo;ici la, tu peux continuer a ecrire ici.</p>
                <div className="qt"><p>Tu viens de faire quelque chose que beaucoup repoussent : agir au moment ou l&rsquo;envie est la. C&rsquo;est exactement ca, ne plus subir.</p></div>
                <button className="cbtn" onClick={() => setShowAppel(false)}>Revenir a la conversation</button>
              </>
            )}
          </div>
        </div>
      )}

      {showEzeckiel && (
        <div className="ez-page">
          <div className="ez-inner">
            <button className="ez-back" onClick={() => setShowEzeckiel(false)}>&#8592; Retour</button>
            <div className="ez-photo">
              <img src="/IMG_20260613_223107.jpg" alt="Ezeckiel"/>
            </div>
            <h1 className="ez-name">Ezeckiel</h1>
            <p className="ez-titre">Praticien holistique</p>
            <div className="ez-div"></div>
            <p className="ez-bio">
              Ezeckiel accompagne les personnes qui traversent des moments difficiles &mdash; professionnels, relationnels, personnels &mdash; avec une approche centree sur le corps et la presence.<br/><br/>
              Pas de recette, pas de programme. Il travaille avec ce que tu portes et t&rsquo;aide a entendre ce que tu sais deja &mdash; <em>mais que les habitudes ont construit par dessus.</em><br/><br/>
              Il te guide, doucement, vers qui tu es vraiment.
            </p>
            <div className="ez-form">
              <p className="ez-form-title">Formation</p>
              <div className="ez-item"><div className="ez-dot"></div><p className="ez-item-text">Master Praticien en Holisyntonie &mdash; 3 ans (Unisun Academy)</p></div>
              <div className="ez-item"><div className="ez-dot"></div><p className="ez-item-text">Approche corps-presence centree sur le senti direct</p></div>
              <div className="ez-item"><div className="ez-dot"></div><p className="ez-item-text">Accompagnement individuel &mdash; tous profils, tous aspects de la vie</p></div>
            </div>
            <div className="ez-cta">
              <p className="ez-cta-note">Un premier echange, gratuit, sans engagement.</p>
              <a href="https://calendly.com/zekzekou/30min" target="_blank" className="ez-cta-btn">Reserver un appel decouverte</a>
            </div>
            <p className="ez-cite">&laquo;&nbsp;Aucun enseignement theorique sur l&rsquo;eau de source n&rsquo;a desaltere un assoiffe.&nbsp;&raquo;<small>&mdash; Luis Ansa</small></p>
          </div>
        </div>
      )}

      {showEmail && (
        <div className="rm">
          <div className="rb">
            {!emailSent ? (
              <>
                <h3 className="rh">Recevoir un resume</h3>
                <p className="rp">Je t&rsquo;envoie un resume de notre echange avec quelques pistes pour avancer.</p>
                <input type="email" placeholder="ton@email.com" value={emailInput} onChange={e => setEmailInput(e.target.value)}
                  style={{width:"100%",background:"#161614",border:"1px solid rgba(244,244,242,0.15)",borderRadius:8,padding:"12px 14px",color:"#f4f4f2",fontSize:14,marginBottom:14,fontFamily:"Inter,sans-serif"}}/>
                <div className="rrow">
                  <button className="rno" onClick={() => setShowEmail(false)}>Annuler</button>
                  <button className="ryes" onClick={() => sendRecap(emailInput)}>Envoyer</button>
                </div>
              </>
            ) : (
              <>
                <div className="check">&#10003;</div>
                <h3 className="rh">C&rsquo;est envoye.</h3>
                <p className="rp">Prends soin de toi.</p>
                <button className="ryes" style={{width:"100%",marginTop:8}} onClick={() => { setShowEmail(false); setEmailSent(false); }}>Fermer</button>
              </>
            )}
          </div>
        </div>
      )}

      {confirmReset && (
        <div className="rm">
          <div className="rb">
            <h3 className="rh">Recommencer ?</h3>
            <p className="rp">Tu reviendras a l&rsquo;accueil. La conversation sera effacee.</p>
            <div className="rrow">
              <button className="rno" onClick={() => setConfirmReset(false)}>Annuler</button>
              <button className="ryes" onClick={resetAll}>Recommencer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
