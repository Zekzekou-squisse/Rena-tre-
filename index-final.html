<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Re-n&#8217;être</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,300;1,9..144,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF8F5;color:#1C1C1A;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0}
textarea,input{outline:none;font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const SYSTEM_PROMPT = `Tu es le compagnon de Renaître — l'espace d'Ezeckiel, thérapeute spécialisé dans la présence corporelle et la libération des histoires que l'on se raconte.

Tu reçois toute personne qui traverse un moment difficile, sans distinction d'âge ni de profil. Ton intelligence thérapeutique reste invisible : tu ne nommes jamais de cadre théorique, jamais les "5 éléments", jamais de jargon.

Ta posture : tu n'interprètes pas, tu ne projettes pas, tu ne juges pas.
Tu invites toujours vers le SENTI. Jamais vers le ressenti.
UNE seule question à la fois. 2 à 4 phrases par réponse. Tutoiement. Chaleur réelle.
Jamais de liste. Parle comme un humain présent.

Si la personne dit oui ou montre de l'intérêt pour un appel : termine EXACTEMENT par [PROPOSER_APPEL]`;

async function callIA(messages) {
  try {
    const r = await fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: messages.map(m => ({ role: m.role, content: m.content }))
      })
    });
    const d = await r.json();
    return d.content?.[0]?.text || "Je suis là, avec toi.";
  } catch {
    return "Je suis toujours là. Prends le temps qu'il te faut.";
  }
}

const PROBLEMATIQUES = [
  { emoji: "💼", label: "Mal-être au travail", amorce: "Je ne me sens plus bien dans mon travail." },
  { emoji: "🧭", label: "Reconversion, changer de voie", amorce: "Je pense à changer de voie mais je n'ose pas." },
  { emoji: "💔", label: "Une séparation difficile", amorce: "Je traverse une séparation et c'est très dur." },
  { emoji: "🎯", label: "Objectif sportif bloqué", amorce: "J'ai un objectif sportif mais quelque chose me bloque." },
  { emoji: "🧑‍🤝‍🧑", label: "Relation parent / ado", amorce: "La relation avec mon ado ou mon parent est compliquée." },
  { emoji: "🌫️", label: "Je me sens perdu·e", amorce: "Je me sens vraiment perdu·e en ce moment." },
  { emoji: "🪫", label: "Épuisé·e, vidé·e", amorce: "Je suis épuisé·e, je n'ai plus d'énergie pour rien." },
  { emoji: "🔁", label: "Je tourne en rond", amorce: "J'ai l'impression de subir ma vie et de tourner en rond." },
];

const css = `
  @keyframes pulse{0%,100%{transform:scale(1);opacity:0.9}50%{transform:scale(1.08);opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes tdot{0%,60%,100%{opacity:.2;transform:scale(1)}30%{opacity:1;transform:scale(1.35)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .grain{position:absolute;inset:0;opacity:0.025;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
  .ring{width:96px;height:96px;border-radius:50%;border:1px solid rgba(28,28,26,0.15);display:flex;align-items:center;justify-content:center;margin-bottom:38px;position:relative;animation:pulse 5s ease-in-out infinite}
  .ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(28,28,26,0.06)}
  .splash{min-height:100vh;background:#FAF8F5;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 26px;text-align:center;position:relative;overflow:hidden}
  .splash-h{font-family:'Fraunces',serif;font-weight:300;font-size:clamp(38px,9vw,58px);line-height:1.05;margin-bottom:28px;position:relative;z-index:1;letter-spacing:-1px;color:#1C1C1A}
  .splash-h em{font-style:italic;font-weight:400}
  .splash-cite{font-family:'Fraunces',serif;font-style:italic;font-weight:300;font-size:16px;color:#4A4844;line-height:1.8;max-width:360px;margin-bottom:8px;position:relative;z-index:1}
  .splash-auteur{font-size:12px;color:#8A8680;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:32px;position:relative;z-index:1}
  .splash-sub{font-size:14px;color:#5A5650;line-height:1.85;max-width:320px;margin-bottom:44px;font-weight:300;position:relative;z-index:1}
  .start-btn{background:#1C1C1A;color:#FAF8F5;border:none;border-radius:40px;padding:17px 52px;font-size:14px;font-weight:500;letter-spacing:0.3px;cursor:pointer;transition:all 0.3s;position:relative;z-index:1}
  .start-btn:active{transform:scale(0.98)}
  .splash-note{font-size:11px;color:#A0A09A;margin-top:16px;letter-spacing:1px;text-transform:uppercase;position:relative;z-index:1}
  .chat-wrap{display:flex;flex-direction:column;height:100vh;background:#0a0a0a;max-width:580px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid rgba(244,244,242,0.08);background:rgba(10,10,10,0.92);backdrop-filter:blur(14px)}
  .top-left{display:flex;align-items:center;gap:9px}
  .top-dot{width:6px;height:6px;border-radius:50%;background:#f4f4f2}
  .top-name{font-family:'Fraunces',serif;font-size:15px;font-weight:400;color:#f4f4f2}
  .top-back{background:none;border:1px solid rgba(244,244,242,0.18);border-radius:2px;color:rgba(244,244,242,0.6);font-size:11px;letter-spacing:0.5px;text-transform:uppercase;padding:7px 13px;cursor:pointer;font-weight:500;transition:all 0.2s}
  .msgs{flex:1;overflow-y:auto;padding:26px 18px}
  .row-ai{display:flex;gap:11px;margin-bottom:20px;align-items:flex-end;animation:rise 0.5s cubic-bezier(.16,1,.3,1) both}
  .row-user{display:flex;justify-content:flex-end;margin-bottom:20px;animation:rise 0.4s cubic-bezier(.16,1,.3,1) both}
  .av{width:30px;height:30px;border-radius:50%;border:1px solid rgba(244,244,242,0.3);display:flex;align-items:center;justify-content:center;font-size:12px;color:#f4f4f2;font-family:'Fraunces',serif;flex-shrink:0;background:#0a0a0a}
  .bub-ai{background:#161614;border:1px solid rgba(244,244,242,0.06);border-radius:2px 14px 14px 14px;padding:15px 19px;max-width:82%;font-size:15.5px;line-height:1.72;white-space:pre-line;color:#eceae6}
  .bub-user{background:#f4f4f2;border-radius:14px 14px 2px 14px;padding:15px 19px;max-width:82%;font-size:15.5px;line-height:1.72;color:#0a0a0a;white-space:pre-line;font-weight:400}
  .izone{padding:13px 16px 26px;background:rgba(10,10,10,0.95);backdrop-filter:blur(14px);border-top:1px solid rgba(244,244,242,0.08)}
  .irow{display:flex;gap:9px;align-items:flex-end}
  .ta{flex:1;background:#161614;border:1px solid rgba(244,244,242,0.12);border-radius:14px;padding:13px 18px;font-size:15.5px;color:#f4f4f2;resize:none;line-height:1.55;max-height:120px}
  .ta::placeholder{color:rgba(244,244,242,0.3)}
  .send{width:46px;height:46px;border-radius:50%;background:#f4f4f2;border:none;color:#0a0a0a;font-size:19px;cursor:pointer;flex-shrink:0}
  .typing{display:flex;gap:6px;padding:6px 4px}
  .td{width:7px;height:7px;border-radius:50%;background:rgba(244,244,242,0.6);animation:tdot 1.3s ease-in-out infinite}
  .probs{padding-left:41px;margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .prob{background:#161614;border:1px solid rgba(244,244,242,0.1);border-radius:12px;padding:13px 14px;font-size:13.5px;color:rgba(244,244,242,0.72);cursor:pointer;text-align:left;display:flex;align-items:center;gap:9px;line-height:1.3;transition:all 0.22s}
  .prob:hover{background:#1e1e1a;border-color:rgba(244,244,242,0.28);color:#f4f4f2}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);display:flex;align-items:flex-end;justify-content:center;z-index:200;animation:fadeIn 0.4s both}
  .sheet{background:#0f0f0e;border:1px solid rgba(244,244,242,0.1);border-bottom:none;border-radius:20px 20px 0 0;padding:30px 24px 36px;width:100%;max-width:580px;animation:slideUp 0.5s cubic-bezier(.16,1,.3,1) both;max-height:92vh;overflow-y:auto}
  .handle{width:40px;height:3px;border-radius:3px;background:rgba(244,244,242,0.2);margin:0 auto 24px}
  .ez-av{width:62px;height:62px;border-radius:50%;border:1px solid rgba(244,244,242,0.3);display:flex;align-items:center;justify-content:center;font-size:24px;color:#f4f4f2;font-family:'Fraunces',serif;margin:0 auto 18px;background:#0a0a0a}
  .sh{font-family:'Fraunces',serif;font-weight:300;font-size:25px;text-align:center;line-height:1.25;margin-bottom:12px;letter-spacing:-0.3px;color:#f4f4f2}
  .sh em{font-style:italic;font-weight:400}
  .ss{font-size:14px;color:rgba(244,244,242,0.55);text-align:center;line-height:1.75;margin-bottom:24px;font-weight:300}
  .qt{border-left:2px solid rgba(244,244,242,0.25);padding:6px 0 6px 16px;margin-bottom:24px}
  .qt p{font-size:14px;font-style:italic;color:rgba(244,244,242,0.6);line-height:1.75;font-family:'Fraunces',serif;font-weight:300}
  .qt span{font-size:12px;color:rgba(244,244,242,0.35);margin-top:8px;display:block;font-style:normal}
  .cbtn{width:100%;background:#f4f4f2;color:#0a0a0a;border:none;border-radius:2px;padding:16px;font-size:13px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;margin-top:16px}
  .gbtn{width:100%;background:transparent;border:none;color:rgba(244,244,242,0.4);font-size:13px;cursor:pointer;margin-top:14px;padding:8px}
  .check{width:58px;height:58px;border-radius:50%;border:1px solid rgba(244,244,242,0.3);display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 18px}
  .rm{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:300;padding:30px;animation:fadeIn 0.3s both}
  .rb{background:#0f0f0e;border:1px solid rgba(244,244,242,0.12);border-radius:14px;padding:28px 24px;max-width:340px;text-align:center}
  .rh{font-family:'Fraunces',serif;font-size:19px;margin-bottom:10px;font-weight:400;color:#f4f4f2}
  .rp{font-size:14px;color:rgba(244,244,242,0.5);line-height:1.6;margin-bottom:22px;font-weight:300}
  .rrow{display:flex;gap:10px}
  .ryes{flex:1;background:#f4f4f2;color:#0a0a0a;border:none;border-radius:2px;padding:13px;font-size:13px;font-weight:600;cursor:pointer}
  .rno{flex:1;background:transparent;border:1px solid rgba(244,244,242,0.2);color:rgba(244,244,242,0.6);border-radius:2px;padding:13px;font-size:13px;cursor:pointer}
`;

function App() {
  const [started, setStarted] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [typing, setTyping] = useState(false);
  const [showAppel, setShowAppel] = useState(false);
  const [appelStep, setAppelStep] = useState("invite");
  const [confirmReset, setConfirmReset] = useState(false);
  const msgRef = useRef(null);

  useEffect(() => { msgRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, typing, showAppel]);

  function now() { return new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }); }

  async function sendMsg(txt) {
    const content = txt || input;
    if (!content?.trim()) return;
    const um = { role: "user", content, time: now() };
    const hist = [...messages, um];
    setMessages(hist); setInput(""); setTyping(true);
    let rep = await callIA(hist);
    setTyping(false);
    if (rep.includes("[PROPOSER_APPEL]")) {
      rep = rep.replace("[PROPOSER_APPEL]", "").trim();
      setMessages(p => [...p, { role: "assistant", content: rep, time: now() }]);
      setTimeout(() => setShowAppel(true), 800);
    } else {
      setMessages(p => [...p, { role: "assistant", content: rep, time: now() }]);
    }
  }

  function start() {
    setStarted(true);
    setTimeout(() => {
      setMessages([{ role: "assistant", content: "Bonjour.\n\nJe suis là, avec toi. Vraiment.\n\nDis-moi ton prénom — et ce qui t'amène. Tu peux écrire librement, ou choisir ce qui te ressemble le plus ci-dessous.", time: "" }]);
    }, 500);
  }

  function resetAll() {
    setStarted(false); setMessages([]); setInput(""); setTyping(false);
    setShowAppel(false); setAppelStep("invite"); setConfirmReset(false);
  }

  if (!started) return (
    <div style={{background:"#FAF8F5",minHeight:"100vh"}}>
      <style>{css}</style>
      <div className="splash">
        <div className="grain"/>
        <div className="ring"><div style={{width:10,height:10,borderRadius:"50%",background:"#1C1C1A"}}/></div>
        <h1 className="splash-h">Re-n&#8217;<em>être</em></h1>
        <p className="splash-cite">&#171;&nbsp;Aucun enseignement théorique sur l&#8217;eau de source n&#8217;a désaltéré un assoiffé.&nbsp;&#187;</p>
        <p className="splash-auteur">&#8212; Luis Ansa</p>
        <p className="splash-sub">Une présence humaine, augmentée par l&#8217;intelligence artificielle. Pour que la vraie rencontre commence là où l&#8217;écran s&#8217;arrête.</p>
        <button className="start-btn" onClick={start}>Commencer</button>
        <p className="splash-note">Gratuit · Confidentiel · Sans inscription</p>
      </div>
    </div>
  );

  return (
    <div style={{background:"#0a0a0a",minHeight:"100vh"}}>
      <style>{css}</style>
      <div className="chat-wrap">
        <div className="top">
          <div className="top-left">
            <div className="top-dot"/>
            <span className="top-name">Re-n&#8217;être · avec toi</span>
          </div>
          <button className="top-back" onClick={() => setConfirmReset(true)}>&#8635; Recommencer</button>
        </div>

        <div className="msgs">
          {messages.map((m, i) => (
            m.role === "assistant" ? (
              <div key={i} className="row-ai">
                <div className="av">E</div>
                <div className="bub-ai">{m.content}</div>
              </div>
            ) : (
              <div key={i} className="row-user">
                <div className="bub-user">{m.content}</div>
              </div>
            )
          ))}
          {typing && (
            <div className="row-ai">
              <div className="av">E</div>
              <div className="bub-ai">
                <div className="typing">
                  {[0,1,2].map(i => <div key={i} className="td" style={{animationDelay:`${i*0.2}s`}}/>)}
                </div>
              </div>
            </div>
          )}
          {messages.length === 1 && !typing && (
            <div className="probs">
              {PROBLEMATIQUES.map((p, i) => (
                <button key={i} className="prob" onClick={() => sendMsg(p.amorce)}>
                  <span style={{fontSize:17,flexShrink:0}}>{p.emoji}</span>
                  <span>{p.label}</span>
                </button>
              ))}
            </div>
          )}
          <div ref={msgRef}/>
        </div>

        <div className="izone">
          <div className="irow">
            <textarea className="ta" rows={1} value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(input); } }}
              placeholder="Écris ce qui est là, maintenant…"/>
            <button className="send" onClick={() => sendMsg(input)}>&#8594;</button>
          </div>
        </div>
      </div>

      {showAppel && (
        <div className="overlay" onClick={e => { if (e.target.className === "overlay" && appelStep !== "confirmed") setShowAppel(false); }}>
          <div className="sheet">
            <div className="handle"/>
            {appelStep === "invite" && (
              <>
                <div className="ez-av">E</div>
                <h2 className="sh">Faire ce pas maintenant,<br/><em>c&#8217;est ton premier geste pour toi.</em></h2>
                <p className="ss">Pas un service qu&#8217;on achète. Le premier &#171;&nbsp;je compte&nbsp;&#187;. Une vraie présence humaine t&#8217;accueille là où l&#8217;écran s&#8217;arrête. Un appel de 30 minutes, gratuit, sans rien devoir après.</p>
                <div className="qt">
                  <p>&#171;&nbsp;Je ne te dis pas quoi faire. Je t&#8217;aide à entendre ce que tu sais déjà — mais que le bruit a couvert.&nbsp;&#187;</p>
                  <span>Ezeckiel · thérapeute holistique</span>
                </div>
                <button className="cbtn" onClick={() => setAppelStep("calendar")}>Choisir un créneau</button>
                <button className="gbtn" onClick={() => setShowAppel(false)}>Pas tout de suite — continuer à écrire</button>
              </>
            )}
            {appelStep === "calendar" && (
              <>
                <h2 className="sh">Choisis ton créneau<br/><em>directement dans mon agenda.</em></h2>
                <p className="ss">30 minutes, par téléphone ou visio. Pendant que l&#8217;élan est vivant.</p>
                <div style={{background:"#161614",border:"1px solid rgba(244,244,242,0.1)",borderRadius:12,padding:18,marginBottom:12,textAlign:"center"}}>
                  <p style={{fontSize:13,color:"rgba(244,244,242,0.4)",marginBottom:14}}>Tu vas être redirigé·e vers le calendrier de réservation.</p>
                  <button className="cbtn" style={{marginTop:0}} onClick={() => {
                    window.open("https://calendly.com/zekzekou/30min", "_blank");
                    setTimeout(() => setAppelStep("confirmed"), 1500);
                  }}>Voir les créneaux disponibles &#8594;</button>
                </div>
                <button className="gbtn" onClick={() => setAppelStep("invite")}>&#8592; Retour</button>
              </>
            )}
            {appelStep === "confirmed" && (
              <>
                <div className="check">&#10003;</div>
                <h2 className="sh">C&#8217;est noté.<br/><em>Ton premier pas.</em></h2>
                <p className="ss">Tu recevras une confirmation de ta réservation. D&#8217;ici là, tu peux continuer à écrire ici autant que tu veux.</p>
                <div className="qt">
                  <p>Tu viens de faire quelque chose que beaucoup repoussent : agir au moment où l&#8217;envie est là. C&#8217;est exactement ça, ne plus subir.</p>
                </div>
                <button className="cbtn" onClick={() => setShowAppel(false)}>Revenir à la conversation</button>
              </>
            )}
          </div>
        </div>
      )}

      {confirmReset && (
        <div className="rm">
          <div className="rb">
            <h3 className="rh">Recommencer ?</h3>
            <p className="rp">Tu reviendras à l&#8217;accueil. La conversation actuelle sera effacée.</p>
            <div className="rrow">
              <button className="rno" onClick={() => setConfirmReset(false)}>Annuler</button>
              <button className="ryes" onClick={resetAll}>Recommencer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
