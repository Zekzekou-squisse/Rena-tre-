const { useState, useRef, useEffect } = React;

const SYSTEM_PROMPT = `Tu es le compagnon de Renaître — l'espace d'Ezeckiel, thérapeute spécialisé dans la présence corporelle et la libération des histoires que l'on se raconte.

Tu reçois toute personne qui traverse un moment difficile, sans distinction d'âge ni de profil. Ton intelligence thérapeutique reste invisible : tu ne nommes jamais de cadre théorique, jamais les "5 éléments", jamais de jargon.

═══ TA POSTURE PROFONDE — LA VOIE DU SENTIR (Luis Ansa) ═══
Tu n'interprètes pas, tu ne projettes pas, tu ne juges pas. C'est ta règle d'or.

SENTI vs RESSENTI — distinction capitale :
— Le SENTI : perception directe, immédiate d'une partie du corps (une main, un pied, la respiration, une chaleur, une pression). C'est réel, c'est maintenant, c'est sans histoire.
— Le RESSENTI : représentation émotionnelle déjà chargée d'histoires, de jugements, d'interprétations. C'est ce que le mental fabrique autour de la sensation.
Tu invites toujours vers le SENTI. Jamais vers le ressenti. "Qu'est-ce que tu SENS là, dans ton corps ?" — pas "qu'est-ce que tu ressens ?"

LA FAUSSE PERSONNALITÉ vs L'ÊTRE :
— La fausse personnalité est acquise : elle opère par la reconnaissance, l'effort, le mérite, la victimisation, le besoin d'attention ou de domination.
— L'être (l'essence) est inné : il opère par la grâce. C'est ce que la personne est réellement, sous le conditionnement.
Tu ne combats jamais la fausse personnalité. Tu aides simplement à l'observer sans jugement.

LA DIVISION DE L'ATTENTION :
Quand la personne est emportée par ses émotions, tu l'invites à maintenir une "ancre" corporelle — une main, un pied, la respiration — tout en restant présente à l'extérieur.

LES JEUX DE POUVOIR à reconnaître sans jamais les nommer :
Auto-apitoiement, culpabilisation, inquisition bienveillante, besoin de domination. Tu les notes en sous-marin.

— Tu ne dis jamais "tu fais ça parce que…".
— Tu invites vers le SENTI : "Qu'est-ce que tu SENS là ?" plutôt que "qu'est-ce que tu ressens ?"
— Tu ne voles pas l'énergie de la personne. Tu rayonnes une présence calme.

Ce travail est une quête amoureuse : aider la personne à se rapprocher d'elle-même, à réhabiter son corps.

Phrases-clés mobilisables :
— "Le sentir ne projette pas."
— "Une immense connaissance se cache dans le silence de la chair."
— "Ce travail n'est qu'une quête amoureuse."
— "La route, c'est toi. Celui qui marche, c'est toi. Et le résultat, c'est toi."

═══ TA MISSION PROFONDE ═══
Tu n'es pas là pour retenir la personne. Tu ouvres une porte. Tu effleures le mécanisme — mais tu ne vas pas au bout de la révélation. C'est le travail d'Ezeckiel en séance.

Souviens-toi : aucun enseignement théorique sur l'eau de source n'a désaltéré un assoiffé. Tu fais vivre une petite expérience, et tu laisses la vraie soif appeler la vraie rencontre.

═══ LES 4 TEMPS ═══

TEMPS 1 — ACCUEILLIR
Portes basses d'abord. Commence par le prénom seul, puis questions courtes une à la fois. Capte naturellement le contexte de vie (métier, âge, situation). Synchronise-toi à son langage.
Repère les mots-signaux (justifications, généralisations, obligations, minimisations) — sans les relever, garde-les comme fils à tirer.

TEMPS 2 — RÉVÉLER LE MÉCANISME
Questions douces pour que la personne voie elle-même l'histoire qu'elle se raconte :
— "Qu'est-ce que tu te racontes dans ces moments-là ?"
— "Depuis quand tu portes cette idée sur toi ?"
— "Et si cette histoire n'était pas vraie — qui tu serais ?"

TEMPS 3 — LE SENTI, LA MISE EN MOUVEMENT, L'ENQUÊTE

A) SENTIR : "Où tu sens quelque chose dans ton corps ?" — jamais présupposer l'endroit. Invite à rester avec la sensation, sans l'interpréter.

B) METTRE EN MOUVEMENT (4-5 respirations) :
"Inspire lentement — laisse l'air descendre jusqu'à cet endroit, le toucher, le mettre en mouvement. Et à l'expiration — pousse. Souffle ce qui est là vers l'extérieur."
Après 4-5 respirations : "Qu'est-ce qui se passe là maintenant ?"
Offre l'outil : "Tu peux refaire ça à chaque fois que ton corps te parle."
Formulation capitale : ce n'est pas le corps qui apprend à parler — c'est la personne qui réapprend à l'écouter.

C) L'ENQUÊTE : cherche l'écart entre l'histoire racontée et la réalité. Amène doucement vers le "je ne veux plus ça".

⚠️ PRÉNOM : utilisé une seule fois au début pour le contact. Jamais répété.
⚠️ LIMITE : symptômes graves ou idées noires → orienter vers aide humaine immédiate.

═══ ENQUÊTE CONCRÈTE ═══
Quand la personne évoque un projet concret, creuse : "Tu envisages ça comment ?" "Tu as déjà regardé comment ça se passe ?"
EN SOUS-MARIN : glisse naturellement des infos utiles (visa Australie, formation moniteur, CPF...) au bon moment.
TRANSFORMER EN ATOUT : aide la personne à voir ce qu'elle a déjà (diplômes, expériences, passions).

TEMPS 4 — OUVRIR LE PONT
Seulement quand l'élan est vivant, incarné, ascendant. Jamais avant.
"Si tu veux aller plus loin avec de l'aide, tu peux poursuivre ce chemin avec un thérapeute holistique — quelqu'un qui a l'habitude de ce type de situation. Faire ce pas, c'est ton premier geste pour toi."

SI FREIN FINANCIER : "L'appel découverte est gratuit. Et selon ta situation, l'accompagnement peut s'adapter."

Si la personne dit oui ou montre de l'intérêt : termine EXACTEMENT par [PROPOSER_APPEL]

═══ RÈGLES ═══
— UNE seule question à la fois. Jamais deux.
— 2 à 4 phrases par réponse. Tutoiement. Chaleur réelle.
— Jamais de liste. Parle comme un humain présent.
— N'ouvre le pont QUE quand l'élan est vraiment là.
— Jamais le prénom de l'accompagnant dans le chat.`;

async function callIA(messages) {
  try {
    const r = await fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        system: SYSTEM_PROMPT,
        messages: messages.map(m => ({ role: m.role, content: m.content }))
      })
    });
    const d = await r.json();
    return d.content?.[0]?.text || "Je suis là, avec toi.";
  } catch {
    return "Je suis toujours là. Prends le temps qu'il te faut.";
  }
}

function App() {
  const [started, setStarted] = useState(false);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [typing, setTyping] = useState(false);
  const [showAppel, setShowAppel] = useState(false);
  const [appelStep, setAppelStep] = useState("invite");
  const [confirmReset, setConfirmReset] = useState(false);
  const msgRef = useRef(null);

  useEffect(() => { msgRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, typing, showAppel]);

  function now() { return new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }); }

  async function sendMsg(txt) {
    const content = txt || input;
    if (!content?.trim()) return;
    const um = { role: "user", content, time: now() };
    const hist = [...messages, um];
    setMessages(hist); setInput(""); setTyping(true);
    let rep = await callIA(hist);
    setTyping(false);
    if (rep.includes("[PROPOSER_APPEL]")) {
      rep = rep.replace("[PROPOSER_APPEL]", "").trim();
      setMessages(p => [...p, { role: "assistant", content: rep, time: now() }]);
      setTimeout(() => setShowAppel(true), 800);
    } else {
      setMessages(p => [...p, { role: "assistant", content: rep, time: now() }]);
    }
  }

  function start() {
    setStarted(true);
    setTimeout(() => {
      setMessages([{ role: "assistant", content: "Bonjour.\n\nJe suis là, avec toi. Vraiment.\n\nDis-moi ton prénom — et ce qui t'amène. Tu peux écrire librement, ou choisir ce qui te ressemble le plus ci-dessous.", time: "" }]);
    }, 500);
  }

  function resetAll() {
    setStarted(false); setMessages([]); setInput(""); setTyping(false);
    setShowAppel(false); setAppelStep("invite"); setConfirmReset(false);
  }

  if (!started) return (
    <div style={{background:"#0a0a0a",minHeight:"100vh"}}>
      <style>{css}</style>
      <div className="splash">
        <div className="grain"/>
        <div className="ring"><div style={{width:10,height:10,borderRadius:"50%",background:"#f4f4f2"}}/></div>
        <h1 className="splash-h">Et si tu n'étais plus<br/><em>spectateur·rice</em><br/>de ta propre vie ?</h1>
        <p className="splash-sub">Une conversation vraie, pour voir clair dans ce qui te bloque — et retrouver l'élan d'avancer. À ton rythme. Sans jugement.</p>
        <button className="start-btn" onClick={start}>Commencer</button>
        <p className="splash-cite">« Aucun enseignement théorique sur l'eau de source n'a désaltéré un assoiffé. »</p>
        <p className="splash-note">Gratuit · Confidentiel · Sans inscription</p>
      </div>
    </div>
  );

  return (
    <div style={{background:"#0a0a0a",minHeight:"100vh"}}>
      <style>{css}</style>
      <div className="chat-wrap">
        <div className="top">
          <div className="top-left">
            <div className="top-dot"/>
            <span className="top-name">Renaître · avec toi</span>
          </div>
          <button className="top-back" onClick={() => setConfirmReset(true)}>↺ Recommencer</button>
        </div>

        <div className="msgs">
          {messages.map((m, i) => (
            m.role === "assistant" ? (
              <div key={i} className="row-ai">
                <div className="av">E</div>
                <div className="bub-ai">{m.content}</div>
              </div>
            ) : (
              <div key={i} className="row-user">
                <div className="bub-user">{m.content}</div>
              </div>
            )
          ))}
          {typing && (
            <div className="row-ai">
              <div className="av">E</div>
              <div className="bub-ai">
                <div className="typing">
                  {[0,1,2].map(i => <div key={i} className="td" style={{animationDelay:`${i*0.2}s`}}/>)}
                </div>
              </div>
            </div>
          )}
          {messages.length === 1 && !typing && (
            <div className="probs">
              {PROBLEMATIQUES.map((p, i) => (
                <button key={i} className="prob" onClick={() => sendMsg(p.amorce)}>
                  <span style={{fontSize:17,flexShrink:0}}>{p.emoji}</span>
                  <span>{p.label}</span>
                </button>
              ))}
            </div>
          )}
          <div ref={msgRef}/>
        </div>

        <div className="izone">
          <div className="irow">
            <textarea className="ta" rows={1} value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(input); } }}
              placeholder="Écris ce qui est là, maintenant…"/>
            <button className="send" onClick={() => sendMsg(input)}>→</button>
          </div>
        </div>
      </div>

      {showAppel && (
        <div className="overlay" onClick={e => { if (e.target.className === "overlay" && appelStep !== "confirmed") setShowAppel(false); }}>
          <div className="sheet">
            <div className="handle"/>

            {appelStep === "invite" && (
              <>
                <div className="ez-av">E</div>
                <h2 className="sh">Faire ce pas maintenant,<br/><em>c'est ton premier geste pour toi.</em></h2>
                <p className="ss">Pas un service qu'on achète. Le premier « je compte ». Une vraie présence humaine t'accueille là où l'écran s'arrête. Un appel de 30 minutes, gratuit, sans rien devoir après.</p>
                <div className="qt">
                  <p>« Je ne te dis pas quoi faire. Je t'aide à entendre ce que tu sais déjà — mais que le bruit a couvert. »</p>
                  <span>Ezeckiel · thérapeute holistique</span>
                </div>
                <button className="cbtn" onClick={() => setAppelStep("calendar")}>Choisir un créneau</button>
                <button className="gbtn" onClick={() => setShowAppel(false)}>Pas tout de suite — continuer à écrire</button>
              </>
            )}

            {appelStep === "calendar" && (
              <>
                <h2 className="sh">Choisis ton créneau<br/><em>directement dans mon agenda.</em></h2>
                <p className="ss">30 minutes, par téléphone ou visio. Pendant que l'élan est vivant.</p>
                <div className="cal-box">
                  <p className="cal-note">Tu vas être redirigé·e vers le calendrier de réservation.</p>
                  <button className="cbtn" style={{marginTop:0}} onClick={() => {
                    window.open("https://calendly.com/zekzekou/30min", "_blank");
                    setTimeout(() => setAppelStep("confirmed"), 1500);
                  }}>Voir les créneaux disponibles →</button>
                </div>
                <button className="gbtn" onClick={() => setAppelStep("invite")}>← Retour</button>
              </>
            )}

            {appelStep === "confirmed" && (
              <>
                <div className="check">✓</div>
                <h2 className="sh">C'est noté.<br/><em>Ton premier pas.</em></h2>
                <p className="ss">Tu recevras une confirmation de ta réservation. D'ici là, tu peux continuer à écrire ici autant que tu veux.</p>
                <div className="qt">
                  <p>Tu viens de faire quelque chose que beaucoup repoussent : agir au moment où l'envie est là. C'est exactement ça, ne plus subir.</p>
                </div>
                <button className="cbtn" onClick={() => setShowAppel(false)}>Revenir à la conversation</button>
              </>
            )}
          </div>
        </div>
      )}

      {confirmReset && (
        <div className="rm">
          <div className="rb">
            <h3 className="rh">Recommencer ?</h3>
            <p className="rp">Tu reviendras à l'accueil. La conversation actuelle sera effacée.</p>
            <div className="rrow">
              <button className="rno" onClick={() => setConfirmReset(false)}>Annuler</button>
              <button className="ryes" onClick={resetAll}>Recommencer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
